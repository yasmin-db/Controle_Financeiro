<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Finanças Pessoais</title>
    <link rel="stylesheet" href="recuperar.css">
</head>
<body>

    <button class="theme-toggle" id="theme-toggle">🌙</button>

    <main class="recovery-wrapper">
        <div class="recovery-container">
            <header class="recovery-header">
                <div class="icon-box">🔒</div>
                <h1>Esqueceu sua senha?</h1>
                <p>Não se preocupe! Digite seu e-mail cadastrado e enviaremos as instruções para criar uma nova senha.</p>
            </header>

            <form action="#" class="recovery-form">
                <div class="input-group">
                    <label for="email">E-mail de Cadastro</label>
                    <input type="email" id="email" placeholder="seu@email.com" required autofocus>
                </div>

                <button type="submit" class="btn-recovery">Enviar Link de Recuperação</button>
            </form>

            <footer class="recovery-footer">
                <a href="login.html" class="link-back">← Voltar para o Login</a>
            </footer>
        </div>
    </main>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        // Check for saved theme preference or default to dark mode
        const currentTheme = localStorage.getItem('theme') || 'dark';
        if (currentTheme === 'light') {
            body.classList.add('light-mode');
            themeToggle.textContent = '☀️';
        } else {
            themeToggle.textContent = '🌙';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            const isLight = body.classList.contains('light-mode');
            themeToggle.textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });
    </script>    

</body>
</html>
