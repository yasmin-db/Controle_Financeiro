<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Finanças Pessoais</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <button class="theme-toggle" id="theme-toggle">🌙</button>

    <main class="login-wrapper">
        <div class="login-container">
            <header class="login-header">
                <h1>📊 Finanças Pessoais</h1>
                <p>Bem-vindo! Faça login para acessar seu dashboard.</p>
            </header>

            <form action="#" class="login-form">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="exemplo@email.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Insira sua senha" required>
                </div>

                <button type="submit" class="btn-login">Entrar no Dashboard</button>
            </form>

            <footer class="login-footer">
                <a href="recuperar.html" class="link-secondary">Esqueceu sua senha?</a>
                <span class="divider"></span>
                <a href="cadastro.html" class="link-secondary">Criar uma conta</a>
            </footer>
        </div>
    </main>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        // Check for saved theme preference or default to dark mode
        const currentTheme = localStorage.getItem('theme') || 'dark';
        if (currentTheme === 'light') {
            body.classList.add('light-mode');
            themeToggle.textContent = '☀️';
        } else {
            themeToggle.textContent = '🌙';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            const isLight = body.classList.contains('light-mode');
            themeToggle.textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });
    </script>

</body>
</html>
